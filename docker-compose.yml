version: '3.8'

# ============================================================
# EC2: SUBRED PRIVADA — Base de Datos
# Solo necesitas subir ESTE archivo a la EC2.
# No necesitas código fuente.
#
# Comando para levantar:
#   docker compose up -d
# ============================================================

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "TechStore_2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - db_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "TechStore_2026!", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  db_data:
